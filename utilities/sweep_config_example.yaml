# Exam# Parameter variation mode (optional, default is false)
# If true: vary one parameter at a time (others stay at template values)
#   - Example: m=[1,2,3], g2mu=[1,2,3] gives 6 combinations
# If false: generate Cartesian product of all parameters
#   - Example: m=[1,2,3], g2mu=[1,2,3] gives 9 combinations
one_at_a_time: falsenfiguration file for parameter sweep
# All parameters not listed here will be taken from the template input file

# Path to the template input file (relative or absolute)
input_template: "/home/frdcol002/hydro/IP-Glasma-only/ipglasma/runs/inputPbPb"

# Parameter variation mode (optional, default is false)
# If true: vary one parameter at a time (others stay at first value)
#   - Example: m=[1,2,3], g2mu=[1,2,3] gives 6 combinations
# If false: generate Cartesian product of all parameters
#   - Example: m=[1,2,3], g2mu=[1,2,3] gives 9 combinations
one_at_a_time: false

# Parameters to vary
vary:
  # Example 1: Vary g2mu with a range using step size
  g2mu:
    start: 0.05
    stop: 0.15
    step: 0.05
  
  # Example 2: Vary smearingWidth with explicit values
  smearingWidth:
    values: [0.4, 0.6, 0.8]
  
  # Example 3: Vary QsmuRatio with a range using number of points
  # QsmuRatio:
  #   start: 0.6
  #   stop: 1.0
  #   num: 5

# Job settings (passed to generate_jobs.py)
job_settings:
  num_jobs: 5           # Number of job scripts per parameter combination
  threads: 8            # Threads per job
  events: 10            # Events per job
  results_folder: "/scratch/frdcol002/ipglasma/sweep_test/"  # Top-level folder for all results
